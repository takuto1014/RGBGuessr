    <meta property="og:type" content="website">
    <meta property="og:title" content="RGBGuessr">
    <meta property="og:description" content="世界中で空前絶後の大ブーム！新感覚推理ゲームが日本に降り立った！今すぐあなたもこのリンクからRGBGuessrをプレイしよう

<body>
    <div id="contents">
        <center>
            <a href="index.html"><img src="RgbGuessr横長.jpg" alt="" width="60%"></a>
            
            <h3>ようこそ裏世界へ
            </h3>
            <p class="heading2">Ao5:5000点を目指して特訓しよう</p>

            <!-- 問題表示 -->
            <!-- <p type="text" class="text2">Let's Guess!</p> -->
            
            <div id="sample" 
            style="
            height: 150px;
            width: wide;"></div>

            
            <!-- 入力部分 -->
            <!-- <div class="flex"> -->
                <div>
                    <p class="heading red2">R(Red)</p>
                    <form oninput="op.value=r_bar.value">
                        <input type="range" id="R_number" value="128" min="0" max="255" step="1" name="r_bar" width="wide" class="input-range R_number">
                        <output name="op">128</output>
                    </form>
                </div>
                <div>
                    <p class="heading green2">G(Green)</p>
                    <form oninput="op.value=g_bar.value">
                        <input type="range" id="G_number" value="128" min="0" max="255" step="1" name="g_bar" width="wide" class="input-range G_number">
                        <output name="op">128</output>
                    </form>
                </div>
                <div>
                    <p class="heading blue2">B(Blue)</p>
                    <form oninput="op.value=b_bar.value">
                        <input type="range" id="B_number" value="128" min="0" max="255" step="1" name="b_bar" width="wide" class="input-range B_number">
                        <output name="op">128</output>
                    </form>
                </div>
            <!-- </div> -->

            
            </center>
    </div>
    <script type="text/javascript" src="index6.js"></script>
